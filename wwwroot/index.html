<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckModsExtended // MANAGER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script>
        const savedTheme = localStorage.getItem('cme-theme');
        if (savedTheme) document.documentElement.dataset.theme = savedTheme;
    </script>
</head>
<body>
    <a href="#main-content" class="skip-link sr-only sr-only-focusable">Skip to main content</a>
    <div id="a11y-announcer" aria-live="polite" class="sr-only"></div>
    <div class="terminal-container">
        <header class="app-header" role="banner">
            <div class="header-title">
                <h1 class="font-brand">[CHECK_MODS_EXTENDED]</h1>
                <span class="version-tag" id="app-version">v---</span>
                <span class="version-tag" id="spt-version" hidden>SPT v---</span>
            </div>
            <div class="header-controls">
                <span id="cache-indicator" class="chip cached pulsing-cache badge badge-warning hidden">
                    <svg id="cache-indicator-icon" class="spin-svg" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1 align-text-bottom"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="4.93" x2="19.07" y2="7.76"></line></svg>
                    <span id="cache-indicator-text">CACHED (UPDATING)</span>
                </span>
                <button id="btn-theme" class="theme-toggle" aria-label="Toggle theme">🌙</button>
                <button id="btn-scan" class="btn-primary">[ SCAN LOCAL MODS ]</button>
            </div>
        </header>


        <main class="dashboard" id="main-content">
            <!-- Workspace Overview -->
            <div id="workspace-overview" class="workspace-overview" class="hidden">
                <!-- Populated by JS -->
            </div>
            
            <!-- Toolbar -->
            <div class="toolbar">
                <div class="search-wrapper">
                    <span class="search-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </span>
                    <input type="text" id="search-input" class="search-input" placeholder="Search mods..." aria-label="Search mods">
                    <span id="search-count" class="search-count"></span>
                </div>
                <div class="filter-chips">
                    <button class="chip active" data-filter="all">All <span class="chip-count" id="chip-count-all">0</span></button>
                    <button class="chip" data-filter="ok">Up to Date <span class="chip-count" id="chip-count-ok">0</span></button>
                    <button class="chip" data-filter="attention">Action Needed <span class="chip-count" id="chip-count-attention">0</span></button>
                    <button class="chip" data-filter="ignored">Ignored <span class="chip-count" id="chip-count-ignored">0</span></button>
                </div>
                <div id="last-scan-time" class="last-scan">
                    Last scan: Never
                </div>
            </div>

            <!-- Master-Detail Container -->
            <div class="master-detail-container">
                <!-- Master List -->
                <div class="master-list">
                    <div class="table-container" class="relative">
                        <div id="table-loading-indicator" class="table-loading-bar" class="hidden"></div>
                        <table class="mod-table" class="w-full">
                            <thead>
                                <tr>
                                    <th class="text-left w-40px">
                                        <input type="checkbox" id="select-all" class="row-checkbox" aria-label="Select all">
                                    </th>
                                    <th data-sortable="status" aria-sort="none" class="text-left">Status</th>
                                    <th data-sortable="name" aria-sort="none" class="text-left">Mod Name</th>
                                    <th data-sortable="type" aria-sort="none" class="text-left">Type</th>
                                    <th data-sortable="version" aria-sort="none" class="col-version" class="text-right">Version</th>
                                </tr>
                            </thead>
                            <tbody id="mods-list">
                                <tr>
                                    <td colspan="5" class="empty-state">Initializing core systems... Ready for scan.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Detail Pane -->
                <div id="detail-pane" class="detail-pane hidden">
                    <div class="detail-header">
                        <h2 id="detail-title">Select a mod to view details</h2>
                        <button id="btn-close-detail" class="btn-close-detail" aria-label="Close detail pane">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                    <div id="detail-content" class="detail-content">
                        <!-- Populated by JS -->
                        <div class="empty-state">Select a mod from the list to view its details.</div>
                    </div>
                </div>
            </div>

            <!-- Bulk Bar -->
            <div id="bulk-bar" class="bulk-bar bulk-bar-hidden">
                <span id="bulk-count">0 selected</span>
                <button id="btn-bulk-open" class="btn-primary">Update Selected</button>
                <button id="btn-bulk-ignore" class="btn-secondary" class="text-warning">Ignore All</button>
                <button id="btn-bulk-clear" class="btn-secondary" class="ml-auto">Clear</button>
            </div>
        </main>

    </div>
    
    <!-- Modal for Ignored Mods -->
    <div id="ignore-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="ignore-modal-title">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="ignore-modal-title">Manage Ignore List</h2>
                <button id="btn-close-modal" class="btn-close-detail" aria-label="Close modal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="ignore-modal-body" class="modal-body">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
