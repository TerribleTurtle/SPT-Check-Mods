<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckModsExtended // MANAGER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="terminal-container">
        <header class="app-header">
            <div class="header-title">
                <h1>[CHECK_MODS_EXTENDED]</h1>
                <span class="version-tag" id="app-version">v---</span>
            </div>
            <div class="header-controls">
                <button id="btn-scan" class="btn-primary">[ SCAN LOCAL MODS ]</button>
            </div>
        </header>

        <main class="dashboard">
            <div id="stats-container" style="display: none;" class="stats-panel">
                <div class="stat-box">
                    <span class="stat-label">CLIENT MODS</span>
                    <span class="stat-value" id="stat-client">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">SERVER MODS</span>
                    <span class="stat-value" id="stat-server">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">OUT OF DATE</span>
                    <span class="stat-value" id="stat-outdated">0</span>
                </div>
                <button id="btn-open-all" class="btn-primary" style="margin-left: auto;">[ OPEN ALL PAGES ]</button>
            </div>

            <div class="table-container">
                <table id="mods-table">
                    <thead>
                        <tr>
                            <th class="col-expand" style="width: 30px;"></th>
                            <th class="col-status">[STATUS]</th>
                            <th class="col-type">[TYPE]</th>
                            <th class="col-name">[MOD NAME]</th>
                            <th class="col-author">[AUTHOR]</th>
                            <th class="col-version">[LOCAL VER]</th>
                            <th class="col-version">[LATEST VER]</th>
                            <th class="col-actions">[ACTIONS]</th>
                        </tr>
                    </thead>
                    <tbody id="mods-body">
                        <tr class="empty-row">
                            <td colspan="8">Initializing core systems... Ready for scan.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>

        <footer class="console-drawer" id="console-drawer">
            <div class="console-header">
                <span>[SYSTEM_LOG]</span>
                <span class="pulse-indicator"></span>
            </div>
            <div class="console-body" id="console-logs" aria-live="polite">
                <div class="log-line">> SYSTEM ONLINE. WAITING FOR DIRECTIVE...</div>
            </div>
        </footer>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
