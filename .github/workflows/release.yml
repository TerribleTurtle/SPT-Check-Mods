name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'
    
    - name: Extract version from tag
      id: version
      run: |
        # Extract the clean semver from the tag (e.g., v1.2.3 -> 1.2.3, v1.0.0-beta.1 -> 1.0.0-beta.1).
        # MSBuild derives the numeric AssemblyVersion/FileVersion from this value.
        VERSION=${GITHUB_REF#refs/tags/}
        VERSION_CLEAN=${VERSION#v}
        # Check if this is a prerelease (contains hyphen)
        if [[ "$VERSION_CLEAN" == *-* ]]; then
          echo "prerelease=true" >> $GITHUB_OUTPUT
        else
          echo "prerelease=false" >> $GITHUB_OUTPUT
        fi
        echo "version=${VERSION_CLEAN}" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION_CLEAN}"
    
    - name: Restore dependencies
      run: dotnet restore CheckModsExtended.csproj

    - name: Build and Publish Windows x64
      run: |
        dotnet publish CheckModsExtended.csproj -c Release -r win-x64 -p:BuildVersion=${{ steps.version.outputs.version }} -o ./publish/win-x64

    - name: Build and Publish Linux x64
      run: |
        dotnet publish CheckModsExtended.csproj -c Release -r linux-x64 -p:PublishTrimmed=true -p:BuildVersion=${{ steps.version.outputs.version }} -o ./publish/linux-x64
    
    - name: Generate Checksums
      run: |
        mkdir -p ./publish/artifacts
        cp ./publish/win-x64/CheckModsExtended-win-x64.exe ./publish/artifacts/
        cp ./publish/win-x64/CheckModsExtended-win-x64.zip ./publish/artifacts/
        cp ./publish/linux-x64/CheckModsExtended-linux-x64 ./publish/artifacts/
        cp ./publish/linux-x64/CheckModsExtended-linux-x64.zip ./publish/artifacts/
        cd ./publish/artifacts
        sha256sum CheckModsExtended-* > checksums.txt
        
    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: './publish/artifacts/CheckModsExtended-*'

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        files: |
          ./publish/artifacts/CheckModsExtended-*
          ./publish/artifacts/checksums.txt
        generate_release_notes: true
        body_path: release_notes.md
        prerelease: ${{ steps.version.outputs.prerelease == 'true' }}

    - name: VirusTotal Scan
      id: vt
      uses: crazy-max/ghaction-virustotal@v4
      with:
        vt_api_key: ${{ secrets.VT_API_KEY }}
        files: |
          ./publish/artifacts/CheckModsExtended-*
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Append VirusTotal links to Release
      run: |
        echo "### VirusTotal Security Scans" > vt_notes.md
        IFS=',' read -ra ADDR <<< "${{ steps.vt.outputs.analysis }}"
        for i in "${ADDR[@]}"; do
          FILEPATH="${i%%=*}"
          FILENAME="$(basename "$FILEPATH")"
          URL="${i#*=}"
          echo "- [$FILENAME]($URL)" >> vt_notes.md
        done
        gh release view ${{ github.ref_name }} --json body -q .body > current_notes.md
        echo "" >> current_notes.md
        cat vt_notes.md >> current_notes.md
        gh release edit ${{ github.ref_name }} --notes-file current_notes.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


