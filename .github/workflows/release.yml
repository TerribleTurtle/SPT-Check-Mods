name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'
    
    - name: Extract version from tag
      id: version
      shell: bash
      run: |
        # Extract the clean semver from the tag (e.g., v1.2.3 -> 1.2.3, v1.0.0-beta.1 -> 1.0.0-beta.1).
        # MSBuild derives the numeric AssemblyVersion/FileVersion from this value.
        VERSION=${GITHUB_REF#refs/tags/}
        VERSION_CLEAN=${VERSION#v}
        if [[ "$VERSION_CLEAN" == *-* ]]; then
          echo "prerelease=true" >> $GITHUB_OUTPUT
        else
          echo "prerelease=false" >> $GITHUB_OUTPUT
        fi
        echo "version=${VERSION_CLEAN}" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION_CLEAN}"
    
    - name: Restore dependencies
      run: dotnet restore CheckModsExtended.slnx

    - name: Run Tests
      run: dotnet test CheckModsExtended.slnx
      
    - name: Build and Publish Native AOT
      shell: bash
      run: dotnet publish CheckModsExtended.csproj -c Release -r ${{ matrix.rid }} -p:PublishAot=true -p:PublishTrimmed=true -p:BuildVersion=${{ steps.version.outputs.version }} -o ./publish/${{ matrix.rid }}
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CheckModsExtended-${{ matrix.rid }}
        path: |
          ./publish/${{ matrix.rid }}/CheckModsExtended-*
          !./publish/${{ matrix.rid }}/*.pdb
        retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./publish/artifacts
        pattern: CheckModsExtended-*
        merge-multiple: true

    - name: Generate Checksums
      run: |
        cd ./publish/artifacts
        sha256sum CheckModsExtended-* > checksums.txt
        
    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: './publish/artifacts/CheckModsExtended-*'

    - name: Extract prerelease flag and version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        VERSION_CLEAN=${VERSION#v}
        if [[ "$VERSION_CLEAN" == *-* ]]; then
          echo "prerelease=true" >> $GITHUB_OUTPUT
        else
          echo "prerelease=false" >> $GITHUB_OUTPUT
        fi
        echo "version=${VERSION_CLEAN}" >> $GITHUB_OUTPUT

    - name: Extract Release Notes from CHANGELOG
      id: extract_notes
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        VERSION_CLEAN=${VERSION#v}
        awk "/^## \[${VERSION_CLEAN}\]/{flag=1; next} /^## \[/{if(flag) exit} flag" CHANGELOG.md > current_notes.md
        if [ ! -s current_notes.md ]; then
          echo "No release notes found for ${VERSION_CLEAN} in CHANGELOG.md" > current_notes.md
        fi

    - name: Package SPT Hub Release
      run: |
        mkdir -p ./publish/artifacts/SptHub
        cp ./publish/artifacts/CheckModsExtended-win-x64.exe ./publish/artifacts/SptHub/
        cp README.md ./publish/artifacts/SptHub/
        cp LICENSE ./publish/artifacts/SptHub/
        cp CHANGELOG.md ./publish/artifacts/SptHub/
        cd ./publish/artifacts/SptHub
        zip -r ../CheckModsExtended-${{ steps.version.outputs.version }}-SptHub.zip ./*

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        files: |
          ./publish/artifacts/CheckModsExtended-*
          ./publish/artifacts/checksums.txt
          ./publish/artifacts/*.zip
        generate_release_notes: true
        body_path: current_notes.md
        prerelease: ${{ steps.version.outputs.prerelease == 'true' }}

    - name: VirusTotal Scan
      id: vt
      uses: crazy-max/ghaction-virustotal@v4
      with:
        vt_api_key: ${{ secrets.VT_API_KEY }}
        request_rate: 4
        files: |
          ./publish/artifacts/*.zip
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Append VirusTotal links to Release
      run: |
        echo "### VirusTotal Security Scans" > vt_notes.md
        IFS=',' read -ra ADDR <<< "${{ steps.vt.outputs.analysis }}"
        for i in "${ADDR[@]}"; do
          FILEPATH="${i%%=*}"
          FILENAME="$(basename "$FILEPATH")"
          URL="${i#*=}"
          echo "- [$FILENAME]($URL)" >> vt_notes.md
        done
        gh release view ${{ github.ref_name }} --json body -q .body > current_notes.md
        echo "" >> current_notes.md
        cat vt_notes.md >> current_notes.md
        gh release edit ${{ github.ref_name }} --notes-file current_notes.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
