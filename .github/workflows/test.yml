name: Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore CheckModsExtended.slnx

      - name: Build
        run: dotnet build CheckModsExtended.slnx --no-restore

      - name: Test
        run: dotnet test CheckModsExtended.slnx --no-build --no-restore --verbosity normal

      - name: Enforce Formatting & Analyzers
        run: dotnet format analyzers --verify-no-changes CheckModsExtended.slnx


