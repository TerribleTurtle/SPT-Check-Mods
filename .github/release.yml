name: Release Notes
changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
      - github-actions[bot]
  categories:
    - title: "Security & Trust"
      labels:
        - security
    - title: "Features"
      labels:
        - feature
        - enhancement
    - title: "Bug Fixes"
      labels:
        - fix
        - bug
    - title: "Dependencies"
      labels:
        - dependencies
    - title: "Documentation"
      labels:
        - documentation
    - title: "Maintenance"
      labels:
        - maintenance
        - chore
        - refactor
